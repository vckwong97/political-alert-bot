name: Political Market Alert Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      send_test_message:
        description: "Send a Telegram test message instead of running the monitor"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run alert monitor
        run: |
          if [[ "${{ github.event.inputs.send_test_message }}" == "true" ]]; then
            python -m political_alert_bot.telegram_test
          else
            python -m political_alert_bot --max-per-source 8 --max-alerts 10 --min-score 45 --lookback-hours 72
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated bot data
        run: |
          if git diff --quiet -- data/seen_alerts.json data/trade_history.json; then
            echo "No bot data changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/seen_alerts.json data/trade_history.json
            git commit -m "Update bot data state"
            git push
          fi
